<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一問一答 クイズシステム</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #e74c3c;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --btn-text: #ffffff;
            --fusen-color: #ffeaa7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .window {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            padding: 25px;
            display: none; /* JSでコントロール */
        }

        /* 画面の切り替え設定 */
        #menu-screen { display: block; }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            text-align: left;
            transition: background 0.2s, transform 0.1s;
        }

        .menu-btn:hover { background: var(--secondary); }
        .menu-btn:active { transform: scale(0.99); }
        .menu-btn span {
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* クイズ画面共通 */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.2s;
        }
        .meta-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .qa-card {
            background: #fbfbfb;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .q-text {
            font-size: 16px;
            font-weight: bold;
            line-height: 1.6;
            margin-bottom: 15px;
            word-break: break-all;
        }

        /* 💡 答えのコンテナ（開閉可能なトグル式にアップデート） */
        .a-container {
            position: relative;
            min-height: 54px;
            background: #f0f0f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer; /* 全体タップでトグル可能に */
        }

        .a-text {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 10px;
            text-align: center;
            word-break: break-all;
        }

        .fusen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--fusen-color);
            color: #c4961a;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1);
            user-select: none;
            transition: transform 0.3s ease, opacity 0.2s;
            padding: 10px;
            text-align: center;
        }

        /* 開閉（めくる・戻す）アニメーション */
        .a-container.revealed .a-text {
            visibility: visible;
            opacity: 1;
        }
        .a-container.revealed .fusen {
            transform: translateY(-100%);
            opacity: 0;
        }

        /* レスポンシブ対応のコントロールボタン配置 */
        .control-btns {
            display: flex;
            flex-direction: row;
            gap: 10px;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: var(--secondary); }
        .btn-sub { background: #e0e0e0; color: #333; }
        .btn-sub:hover { background: #d5d5d5; }
        
        /* 戻るボタンが無効な場合（第1問のとき） */
        .btn:disabled {
            background: #eebdbebd !important;
            color: #aaa !important;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* モード2の一覧表示 */
        #list-container {
            max-height: 65vh;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .nav-footer {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
            text-align: center;
        }

        /* 📱 スマートフォン向けレスポンシブ微調整 */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .window {
                padding: 15px;
                border-radius: 8px;
            }
            h1 {
                font-size: 18px;
            }
            .q-text {
                font-size: 15px;
            }
            .a-text {
                font-size: 16px;
            }
            .control-btns {
                gap: 8px;
            }
            .btn {
                padding: 12px 6px;
                font-size: 12px;
            }
            .menu-btn {
                padding: 14px 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- 1. スタートメニュー画面 -->
    <div class="window" id="menu-screen">
        <h1>一問一答クイズメニュー</h1>
        <p class="subtitle">自分のやるモードを選んでください。</p>
        
        <button class="menu-btn" onclick="startMode(1)">
            <span>モード 1</span> 1問ずつじっくり挑戦する
        </button>
        <button class="menu-btn" onclick="startMode(2)">
            <span>モード 2</span> 全問一気に解く（一覧めくり方式）
        </button>
        <button class="menu-btn" onclick="startMode(3)">
            <span>モード 3</span> ランダムに出題（実力テスト）
        </button>
    </div>

    <!-- 2. モード1 & モード3 用クイズ画面 -->
    <div class="window" id="quiz-screen">
        <h1 id="quiz-title">一問一答テスト</h1>
        <div class="progress-bar"><div class="progress-fill" id="quiz-progress"></div></div>
        <div class="meta-info">
            <span id="quiz-count">第 1 問 / -- 問</span>
            <span id="quiz-status"></span>
        </div>

        <div class="qa-card">
            <div class="q-text" id="quiz-question">問題文がここに表示されます。</div>
            <!-- 付箋部分全体をクリック（タップ）で開閉可能に -->
            <div class="a-container" id="quiz-a-container" onclick="toggleAnswer(this)">
                <div class="a-text" id="quiz-answer">正解データ</div>
                <div class="fusen">タップして付箋をめくる<br><span style="font-size:10px; font-weight:normal; opacity:0.8;">(もう一度タップで戻せます)</span></div>
            </div>
        </div>

        <div class="control-btns">
            <button class="btn btn-sub" onclick="toMainMenu()">メニュー</button>
            <button class="btn btn-sub" id="prev-btn" onclick="prevQuestion()">◀ 1問戻る</button>
            <button class="btn btn-main" id="next-btn" onclick="nextQuestion()">次の問題 ▶</button>
        </div>
    </div>

    <!-- 3. モード2 全問一覧画面 -->
    <div class="window" id="list-screen">
        <h1>全問一気見リスト</h1>
        <p class="subtitle">付箋をタップすると開閉（めくる・閉じる）ができます。</p>
        
        <div id="list-container"></div>

        <div class="nav-footer">
            <button class="btn btn-sub" onclick="toMainMenu()" style="width:100%;">メニューへ戻る</button>
        </div>
    </div>

    <!-- 4. 結果画面 -->
    <div class="window" id="result-screen">
        <h1>終了お疲れ様でした！</h1>
        <p class="subtitle" style="font-size:15px; margin-bottom:20px;">範囲内の全問題をすべて解き終えました！</p>
        <button class="btn btn-main" onclick="toMainMenu()" style="width:100%;">メニュー画面に戻る</button>
    </div>

    <script>
        const allQuestions = [
    {
        "q": "コンピュータを構成している装置や部品などのこと。",
        "a": "ハードウェア"
    },
    {
        "q": "コンピュータを構成する入力装置・記憶装置・制御装置・演算装置・出力装置の五つの装置の総称。",
        "a": "五大装置"
    },
    {
        "q": "私たちが取り扱う文字や数値、画像、音声、映像などを、コンピュータが処理できるデジタルデータに変換して主記憶装置などに読み込ませる装置。",
        "a": "入力装置"
    },
    {
        "q": "プログラムやデータ、処理結果などを記憶する装置。主記憶装置と補助記憶装置に分けられる。",
        "a": "記憶装置"
    },
    {
        "q": "記憶装置の命令を取り出して解読し、各装置が効率よく動作するように指示を送る装置。",
        "a": "制御装置"
    },
    {
        "q": "記憶装置から読み込んだデータを用いて、四則演算や比較判断などを行う装置。",
        "a": "演算装置"
    },
    {
        "q": "コンピュータの内部で処理されたデータを、利用者が認識できる形式（文字・数値・画像・音声・映像など）で提示する装置。",
        "a": "出力装置"
    },
    {
        "q": "五大装置のなかで、制御装置と演算装置をあわせた装置。パソコンでは、プロセッサや小型演算処理装置（MPU）とも呼ばれる。",
        "a": "中央処理装置（CPU）"
    },
    {
        "q": "コンピュータ本体に組み込まれて、CPUから直接読み書きできる記憶装置。メモリ、メインメモリとも呼ばれ、ROMとRAMがある。",
        "a": "主記憶装置"
    },
    {
        "q": "CPUから直接読み書きできないが、電源を切っても記憶された内容が消えない記憶装置の総称。",
        "a": "補助記憶装置"
    },
    {
        "q": "入力装置や出力装置、補助記憶装置などの総称。",
        "a": "周辺装置"
    },
    {
        "q": "コンピュータの中心部分であるCPU（制御装置と演算装置）とメモリ（主記憶装置）を合わせた名称。",
        "a": "処理装置"
    },
    {
        "q": "キーを打つことで文字や数値、記号などのデータをコンピュータに入力する装置。",
        "a": "キーボード"
    },
    {
        "q": "コンピュータの操作全般に用いられる入力装置。平らな面の上で動かし、画面上に表示された物の場所を指し示して選択する。形状がネズミに似ている。",
        "a": "マウス"
    },
    {
        "q": "商品などに貼付されたり、パッケージに印刷されたりしているバーコードを、光学的に読み取る装置。",
        "a": "バーコードリーダ"
    },
    {
        "q": "ディスプレイ上に表示されたマークやボタンを指やペンで触れることにより、データを入力する装置。",
        "a": "タッチパネル"
    },
    {
        "q": "写真や絵、印刷物などの画像を光学的に読み取り、デジタルデータとして入力する装置。",
        "a": "イメージスキャナ"
    },
    {
        "q": "ディスプレイ上の位置情報を入力する装置の総称。マウスやペンタブレット、タッチパッド、タッチパネルなどがある。",
        "a": "ポインティングデバイス"
    },
    {
        "q": "キーボードやマウスから入力したデータや、コンピュータで処理した結果などを画面に表示する装置。",
        "a": "ディスプレイ"
    },
    {
        "q": "プリンタの印刷性能やディスプレイの表示能力など、きめ細かさや画質の滑らかさを表す尺度。単位には、dpiやppiがある。",
        "a": "解像度"
    },
    {
        "q": "コンピュータ内部で処理されたデータを用紙に印刷する装置の総称。",
        "a": "プリンタ"
    },
    {
        "q": "レーザ光で感光ドラムに印刷物の像を作り、そこにトナーを付着させて印刷する装置。ビジネス用として広く用いられている。",
        "a": "レーザープリンタ"
    },
    {
        "q": "インクの微粒子を紙に吹き付けることにより印刷する装置。通常、色の三原色に黒を加えたCMYKの4色のインクを用いて印刷している。",
        "a": "インクジェットプリンタ"
    },
    {
        "q": "三次元（3D）の形状データをもとに、熱で溶かした樹脂を何層も塗り重ねて立体物を作る装置。",
        "a": "三次元プリンタ（3Dプリンタ）"
    },
    {
        "q": "コンピュータ画面などの画像や動画を、スクリーンに投影する装置。",
        "a": "プロジェクタ"
    },
    {
        "q": "金属素材の円盤（ディスク）の表面に磁性体を塗布し、1本の軸に複数枚を取り付け、その円盤（ディスク）に読み書きする装置。",
        "a": "ハードディスク装置（HDD）"
    },
    {
        "q": "大容量の半導体メモリを用いた補助記憶装置。軽量かつ小型で消費電力も少なく、衝撃に強く耐久性にも優れ、高速でデータの読み書きをすることができる。",
        "a": "SSD"
    },
    {
        "q": "データの読み出しや書き込みに、レーザ光を使用する光ディスクを記憶媒体として用いる記憶装置の総称。",
        "a": "光学ドライブ"
    },
    {
        "q": "音楽を記録するために開発されたCDに記録されたデータを読み込む装置。CDの記憶容量は、最大で約700MBである。",
        "a": "CDドライブ"
    },
    {
        "q": "CDの記録密度を高めたDVDにデータを読み書きする装置。CDドライブと同じ赤色のレーザ光を利用する。DVDの記憶容量は、標準的な片面1層式ではCDの約7倍の4.7GB程度である。",
        "a": "DVDドライブ"
    },
    {
        "q": "DVDより、さらに大容量のデータが記録可能なブルーレイディスク（BD）にデータを読み書きする装置。青紫色のレーザ光を利用する。BDの記憶容量は、25GB、50GBなどである。",
        "a": "ブルーレイドライブ"
    },
    {
        "q": "フラッシュメモリを内蔵した小型の補助記憶装置。コンピュータなどのUSB端子に差し込んで利用する。",
        "a": "USBメモリ"
    },
    {
        "q": "プラスチック製のカードにフラッシュメモリが内蔵されており、広く普及しているメモリカード。標準サイズ、ミニSD、マイクロSDなどがある。",
        "a": "SDメモリカード"
    },
    {
        "q": "おもに静止画像を撮影し、デジタルデータに変換して記録するカメラ。動画の撮影も可能である。",
        "a": "デジタルカメラ"
    },
    {
        "q": "既存のコンピュータ製品以外で、インターネット接続やコンピュータ機能を搭載し、ソフトウェアによる高度な情報処理を実現できる多機能端末の総称。",
        "a": "スマートデバイス"
    },
    {
        "q": "各周辺装置とバスと呼ばれる伝送路を接続する部分（規格）のことで、二つの異なるものをつなぎシステムや機能である。",
        "a": "インタフェース"
    },
    {
        "q": "キーボードやマウス、プリンタなどの周辺装置と、パソコンなどを結ぶシリアルインタフェースの規格。一つの受け口（ポート）で、最大127台までの機器を接続することができる。",
        "a": "USB"
    },
    {
        "q": "パソコンおよびテレビなどのデジタル家電やAV機器、家庭用ゲーム機などで使われる、映像や音声の入出力用のインタフェースの規格。映像・音声・制御信号を1本のケーブルで送受信することができる。",
        "a": "HDMI"
    },
    {
        "q": "電波を利用して、数mから数十m程度の近距離間でのデータ交換に利用されるインタフェースの規格。障害物があってもデータを送受信することができる。",
        "a": "Bluetooth"
    },
    {
        "q": "識別番号などを記録した小さな集積回路（IC）を組み込んだICタグを物品に添付し、電波を利用して非接触でデータ通信を行う仕組みの総称。",
        "a": "RFID"
    },
    {
        "q": "複数の電子回路をまとめて一つの部品として構成したもので、数ミリ角の半導体基板上に、電子回路が多数埋め込まれているもの。",
        "a": "集積回路（IC）"
    },
    {
        "q": "コンピュータを構成する装置の一つで、主記憶装置のこと。コンピュータ本体に組み込まれて、CPUから直接読み書きできる記憶装置である。",
        "a": "メモリ"
    },
    {
        "q": "データの読み出し専用のメモリのことで、電源を切っても記憶内容が消えない性質（不揮発性）がある。",
        "a": "ROM"
    },
    {
        "q": "データの読み出しと書き込みができるメモリのことで、電源を切ると記憶内容が消えてしまう性質（揮発性）がある。",
        "a": "RAM"
    },
    {
        "q": "パソコン本体にあるCPUやROM、RAMなどの主要な電子部品を搭載したプリント基板。メインボードともいう。",
        "a": "マザーボード"
    },
    {
        "q": "ディスプレイに映像を出力するための機能を、拡張ボードとしてマザーボードから独立させた装置。ビデオカードやグラフィックボードなどとも呼ばれる。",
        "a": "ビデオボード"
    },
    {
        "q": "ビデオボードのGPUに搭載されている映像処理専用のメモリ。",
        "a": "VRAM"
    },
    {
        "q": "不揮発性の半導体メモリを使った補助記憶装置。消費電力が少なく、衝撃にも強い。",
        "a": "フラッシュメモリ"
    },
    {
        "q": "連続して変化する量を、時計の針の位置や音の波形などのように連続した量（連続値）で表現する概念のこと。",
        "a": "アナログ"
    },
    {
        "q": "連続して変化する量を、一定の間隔で区切った数字や段階的な数値（離散値）で表現する概念のこと。",
        "a": "デジタル"
    },
    {
        "q": "数値の表現で、1桁を2種類の数値（「0」または「1」）で表す2進法で表された数値。",
        "a": "2進数"
    },
    {
        "q": "2進数の1桁のことで、情報の最小単位である。",
        "a": "ビット"
    },
    {
        "q": "2進数の8桁分のまとまりのことで、通常、コンピュータではこれを情報の基本単位として扱う。",
        "a": "バイト"
    },
    {
        "q": "ある進数（2進数や10進数など）で表記された数値を、別の進数での表記に変換すること。",
        "a": "基数変換"
    },

        let currentMode = 1;
        let activeQuestions = [];
        let currentIndex = 0;

        function toMainMenu() {
            document.querySelectorAll('.window').forEach(el => el.style.display = 'none');
            document.getElementById('menu-screen').style.display = 'block';
        }

        function startMode(modeNum) {
            currentMode = modeNum;
            currentIndex = 0;
            
            document.querySelectorAll('.window').forEach(el => el.style.display = 'none');

            if (modeNum === 1) {
                activeQuestions = [...allQuestions];
                document.getElementById('quiz-title').innerText = "1問ずつ挑戦（標準順）";
                setupQuizScreen();
            } else if (modeNum === 2) {
                setupListScreen();
            } else if (modeNum === 3) {
                activeQuestions = [...allQuestions].sort(() => Math.random() - 0.5);
                document.getElementById('quiz-title').innerText = "ランダム実力テスト";
                setupQuizScreen();
            }
        }

        function setupQuizScreen() {
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= activeQuestions.length) {
                document.querySelectorAll('.window').forEach(el => el.style.display = 'none');
                document.getElementById('result-screen').style.display = 'block';
                return;
            }

            const current = activeQuestions[currentIndex];
            
            // 状態のリセット
            const container = document.getElementById('quiz-a-container');
            container.classList.remove('revealed');

            // テキストの流し込み
            document.getElementById('quiz-question').innerText = current.q;
            document.getElementById('quiz-answer').innerText = current.a;

            // プログレス
            const total = activeQuestions.length;
            document.getElementById('quiz-count').innerText = `第 ${currentIndex + 1} 問 / ${total} 問`;
            document.getElementById('quiz-progress').style.width = `${((currentIndex) / total) * 100}%`;

            // 1問戻るボタンの制御（第1問の時は無効化）
            const prevBtn = document.getElementById('prev-btn');
            if (currentIndex === 0) {
                prevBtn.disabled = true;
            } else {
                prevBtn.disabled = false;
            }
        }

        // 付箋のトグル（開閉）処理
        function toggleAnswer(containerEl) {
            containerEl.classList.toggle('revealed');
        }

        function nextQuestion() {
            currentIndex++;
            showQuestion();
        }

        // 1問戻る処理
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }

        // モード2 一覧画面の生成
        function setupListScreen() {
            document.getElementById('list-screen').style.display = 'block';
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            allQuestions.forEach((item, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'qa-card';
                itemDiv.innerHTML = `
                    <div class="q-text">問 ${idx + 1}: ${item.q}</div>
                    <div class="a-container" onclick="toggleAnswer(this)">
                        <div class="a-text">${item.a}</div>
                        <div class="fusen">タップして付箋をめくる</div>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }
    </script>
